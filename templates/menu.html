<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Grid */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: containerSlideUp 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes containerSlideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.8), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        h1 {
            text-align: center;
            color: #f8fafc;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .menu-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .button {
            display: block;
            text-decoration: none;
            padding: 20px 28px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            text-align: center;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: buttonSlideIn 0.6s ease-out both;
        }

        .button:nth-child(1) { animation-delay: 0.1s; }
        .button:nth-child(2) { animation-delay: 0.2s; }
        .button:nth-child(3) { animation-delay: 0.3s; }
        .button:nth-child(4) { animation-delay: 0.4s; }
        .button:nth-child(5) { animation-delay: 0.5s; }

        @keyframes buttonSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .button:hover::before {
            left: 100%;
        }

        .button:hover {
            background: rgba(59, 130, 246, 0.2);
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        .button:nth-child(4) {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .button:nth-child(4):hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2);
        }

        .button:nth-child(5) {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .button:nth-child(5):hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .button {
                padding: 16px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="grid-bg"></div>
    <div class="gradient-overlay"></div>

    <div class="container">
        <h1><i class="fas fa-robot"></i> SMART ATTENDANCE SYSTEM</h1>
        <p class="subtitle">Welcome! Please select an option:</p>
        <div class="menu-options">
            <a href="{{ url_for('register_student') }}" class="button">
                <i class="fas fa-camera"></i> Register New Student (Capture Face)
            </a>
            <a href="{{ url_for('train_model') }}" class="button">
                <i class="fas fa-brain"></i> Train Face Recognition Model
            </a>
            <a href="{{ url_for('start_attendance') }}" class="button">
                <i class="fas fa-play"></i> Start Attendance System
            </a>
            <a href="{{ url_for('dashboard') }}" class="button">
                <i class="fas fa-chart-line"></i> Open Attendance Dashboard
            </a>
            <a href="{{ url_for('logout') }}" class="button">
                <i class="fas fa-sign-out-alt"></i> Exit / Logout
            </a>
        </div>
    </div>
</body>
</html>
